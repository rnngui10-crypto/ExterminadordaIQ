kind = "web"
previewPath = "/"
title = "IA Trading IQ Option"
version = "1.0.0"
id = "artifacts/iq-trader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22251

[services.development]
run = "pnpm --filter @workspace/iq-trader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iq-trader", "run", "build" ]
publicDir = "artifacts/iq-trader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22251"
BASE_PATH = "/"
